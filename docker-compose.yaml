services:
  app:
    image: valentinusdelvin/nutrimama:main
    container_name: daris_be
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3014:${APPPORT}"
    networks:
      - mariadb_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - TZ=Asia/Jakarta

  watchtower:
    image: containrrr/watchtower:latest
    container_name: daris_watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.40
    command:
      - "--label-enable"
      - "--interval"
      - "300"
      - "--rolling-restart"

networks:
  mariadb_network:
    external: true
