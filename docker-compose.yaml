services:
  app:
    image: valentinusdelvin/nutrimama:main
    container_name: daris_be
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3014:${APPPORT}"
    networks:
      - mariadb_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - TZ=Asia/Jakarta
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    image: migrate/migrate
    container_name: daris_migrate
    volumes:
      - ./db/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=mysql://${DB_USER}:${DB_PASSWORD}@tcp(${DB_HOST}:${DB_PORT})/${DB_NAME}"
      - "up"
    env_file: .env
    networks:
      - mariadb_network

  watchtower:
    image: containrrr/watchtower
    container_name: daris_watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "--label-enable"
      - "--interval"
      - "300"
      - "--rolling-restart"

networks:
  mariadb_network:
    external: true